<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Silhouette preview</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" />
    <style>
      body {
        margin: 0;
        padding: 24px;
        background: #f5efe6;
        color: #2a2118;
        font-family: 'Fredoka', system-ui, sans-serif;
      }
      h1 { margin: 0 0 8px; }
      .sub { color: #847467; margin: 0 0 20px; }
      h2 { font-size: 14px; text-transform: uppercase; letter-spacing: 1px; color: #847467; margin: 32px 0 12px; }
      .grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 16px;
      }
      .card {
        background: #fff;
        border-radius: 14px;
        padding: 14px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        box-shadow: 0 2px 8px rgba(60, 40, 20, 0.08);
      }
      .silhouette {
        width: 100%;
        aspect-ratio: 1.5;
        background: #faf6ee;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 10px;
      }
      .silhouette svg { width: 100%; height: 100%; display: block; }
      .name { font-size: 15px; font-weight: 600; text-align: center; }
      .credit { font-size: 10px; color: #847467; text-align: center; }
      .compare {
        margin-top: 12px;
        display: grid;
        grid-template-columns: repeat(6, 1fr);
        gap: 10px;
      }
      .compare .card { padding: 8px; }
      .compare .silhouette { padding: 6px; }
      .compare .name { font-size: 11px; }
      .compare .credit { display: none; }
    </style>
  </head>
  <body>
    <h1>Dino silhouettes — readability check</h1>
    <p class="sub">Real PhyloPic silhouettes rendered with each species' tint colour. The lower row mirrors museum thumbnail size.</p>
    <h2>Full-size readability</h2>
    <div class="grid" id="grid"></div>
    <h2>Museum-thumbnail size</h2>
    <div class="compare" id="compare"></div>
    <script>
      (async () => {
        const data = await fetch('../data/species.json?ts=' + Date.now()).then(r => r.json());
        const grid = document.getElementById('grid');
        const compare = document.getElementById('compare');
        for (const key of Object.keys(data)) {
          const info = data[key];
          const vb = info.viewBox || '0 0 100 60';
          const creditLine = info.credit
            ? `<div class="credit">${info.credit.artist || 'Public domain'} · ${info.credit.license}</div>`
            : '';
          grid.insertAdjacentHTML('beforeend', `
            <div class="card">
              <div class="silhouette" style="color:${info.tint};">
                <svg viewBox="${vb}" xmlns="http://www.w3.org/2000/svg" fill="currentColor">${info.silhouette}</svg>
              </div>
              <div class="name">${info.displayName}</div>
              ${creditLine}
            </div>
          `);
          compare.insertAdjacentHTML('beforeend', `
            <div class="card">
              <div class="silhouette" style="color:${info.tint};">
                <svg viewBox="${vb}" xmlns="http://www.w3.org/2000/svg" fill="currentColor">${info.silhouette}</svg>
              </div>
              <div class="name">${info.displayName}</div>
            </div>
          `);
        }
      })();
    </script>
  </body>
</html>
